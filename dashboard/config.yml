  de:
    about:
      title: "Über"
      button: "Schließen"
      content: |
        ### Dashboard
        Ihr Geschäftsprofil und ein Protokoll der Dokumente, die Sie mit
        invoice, reimburse und timesheet erstellt haben.

        **Profil** füllt leere Felder in diesen drei Apps automatisch aus —
        bereits eingegebene Werte werden nie überschrieben.

        **Einträge** ist ein laufendes Protokoll (Datum, Referenz, Partei,
        Betrag) aller Dokumente, die diese Apps erzeugt haben — nur die
        Metadaten, nicht die PDFs selbst.

        **Sicherung** lädt eine Datei mit beidem herunter, damit Sie zu einem
        anderen Browser oder Gerät wechseln können — sonst lebt alles hier nur
        in diesem Browser. Eine hochgeladene Sicherungsdatei führt ihre
        Einträge mit den vorhandenen zusammen; es wird nie etwas gelöscht.

        **Quellcode:** [kbenestad/bizdocs](https://github.com/kbenestad/bizdocs)

