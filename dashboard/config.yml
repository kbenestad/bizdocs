# =============================================================================
# Dashboard App — Configuration
# =============================================================================
# Holds a user's shared profile (identity/bank details that invoice, reimburse
# and timesheet pre-fill from whenever their own field is still blank) and a
# log of every document those three apps have generated. Both are portable via
# this app's export/import — a downloadable/uploadable JSON file, since there
# is no backend. organization/logo/logo-maxwidth/tagline/accent-colour are
# blank here on purpose — they inherit from ../config.yml (root, org-wide
# settings). Give one a value only if this app needs to override it.

# Organization — inherited from ../config.yml (root, org-wide settings) when
# left blank here. Set a value below only to override it for this app alone.
organization:
logo:
logo-maxwidth:
tagline:

# Branding — inherited from ../config.yml when blank; override here if needed.
accent-colour:

# ── Localisation ──────────────────────────────────────────────────────────────
# Every user-facing string lives here, under each language's `ui:` block, and is
# looked up via S('key'). Use {token} placeholders for interpolation.
localisation:
  default-language: en

  languages:
    - code: en
      name: English
    - code: de
      name: Deutsch

  en:
    about:
      title: "About"
      button: "Close"
      content: |
        ### Dashboard
        Your business profile and a log of the documents you've generated in
        invoice, reimburse, and timesheet.

        **Profile** fills in blank fields in those three apps automatically —
        it never overwrites something you've already typed there.

        **Records** is a running log (date, reference, party, amount) of
        every document those apps have generated — metadata only, not the
        PDFs themselves.

        **Backup** downloads one file with both, so you can move to another
        browser or machine — everything here lives only in this browser
        otherwise. Uploading a backup file merges its records into what's
        already here; it never deletes anything.

        **Source:** [kbenestad/bizdocs](https://github.com/kbenestad/bizdocs)

        {repo}
        {version-line}

        Licensed under the Apache 2 licence. Please see LICENSE in root.
