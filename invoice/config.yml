# =============================================================================
# Invoice App — Configuration
# =============================================================================

# ── Dependencies ───────────────────────────────────────────────────────────
# CDN libraries loaded dynamically after this file parses — swap `url` to
# point at a local vendored copy instead of the CDN without touching
# index.html; drop/blank `integrity` when doing so (a local file won't match
# the CDN's SRI hash). See ../docs/dependencies.md for the current versions/hashes.
# Note: js-yaml itself stays hardcoded in index.html's <head> — it's needed
# to fetch and parse this very file, so it can't be config-driven.
dependencies:
  jspdf:
    url: "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
    integrity: "sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk"

# Organization — inherited from ../config.yml (root, org-wide settings) when
# left blank here. Set a value below only to override it for this app alone.
organization:
logo:                         # yes|no — if yes, loads ../assets/logo.png (shared org logo)
logo-maxwidth:                # cm — maximum logo width on PDF
tagline:

# Page setup
paper-format: a4             # a4 or letter

# PDF output language: default (the first defined language) or user-selected (follow the UI)
output-language: default

# Typography
# Standard fonts: Helvetica, Times, Courier (plus Bold/Italic variants)
# Custom: place a .ttf file in assets/ and use the filename (e.g. "assets/MyFont.ttf")
font-body: Helvetica
font-heading: Helvetica
font-monospace: Courier
font-size: 10                # base font size in pt for PDF

# Branding — inherited from ../config.yml when blank; override here if needed.
accent-colour:
theme:

# ── Payment info visibility ───────────────────────────────────────────────────
# Set to true to hide the payment info panel entirely (useful if payment info
# should not appear on invoices, e.g. per company policy).
hide-payment-info: false

# ── Date format ───────────────────────────────────────────────────────────────
# Tokens: d=day, dd=day(0-padded), M=month, MM=month(0-padded),
#         MMM=short month name, MMMM=full month name, YY=2-digit year, YYYY=4-digit year
date-format: "d MMMM YYYY"

# ── Tax types (user builds tax lines; these are the label options) ─────────────
tax-types:
  - key: vat
  - key: gst
  - key: sales-tax
  - key: withholding
  - key: other

# ── Units of measure ──────────────────────────────────────────────────────────
uom:
  - code: EA
  - code: HR
  - code: DY
  - code: WK
  - code: MO
  - code: LS

# ── Predefined recipients (charge-to) ─────────────────────────────────────────
charge-to:
  - display: Acme Corporation
    name: Acme Corporation Ltd.
    address1: 123 Business Avenue
    address2: Suite 400
    address3: New York, NY 10001
    address4: ""
    country: US
    phone: "+1-212-555-0100"
    email: accounts@acmecorp.example
    vat-id: "US-EIN-12-3456789"
    reg-no: ""
    currency: USD
    project-codes:
      - AC-100
      - AC-110
      - AC-200
  - display: Example NGO
    name: Example Non-Profit Organisation
    address1: 45 Charity Lane
    address2: London EC1A 1BB
    address3: ""
    address4: ""
    country: GB
    phone: "+44 20 7123 4567"
    email: finance@examplengo.example
    vat-id: "GB123456789"
    reg-no: "01234567"
    currency: GBP
    project-codes:
      - NGO-2026-01
      - NGO-2026-02
      - NGO-2026-03

# ── Project codes ──────────────────────────────────────────────────────────────
project-codes:
  - Project 100
  - Project 110
  - Project 230

# ── Predefined products / services ────────────────────────────────────────────
products:
  - code: CONSULTING
    uom: HR
    price: 100.00
  - code: TRAINING
    uom: DY
    price: 800.00
  - code: REPORT
    uom: EA
    qty: 1
    price: 500.00
  - code: REVIEW
    uom: HR
    price: 120.00

# ── Foreign currency options ───────────────────────────────────────────────────
currencies:
  - USD
  - EUR
  - GBP
  - JPY
  - CHF
  - CAD
  - AUD
  - NOK
  - SEK
  - DKK
  - THB
  - SGD
  - HKD
  - INR
  - MXN
  - BRL
  - ZAR

# ── Fixed exchange rates ───────────────────────────────────────────────────────
# Optional. Pin the conversion rate for a currency pair so that, when a line's
# foreign currency and the invoice currency match one of these pairs, the rate
# is filled in automatically and a note shows when it was last updated (users
# can still overwrite the filled-in rate by hand for a one-off invoice).
# fxrate reads as: 1 currency1 = fxrate currency2.
# Leave the list empty (or omit it) and every line requires a manually-entered rate.
fixedfxrate:
  - currency1: USD
    currency2: EUR
    fxrate: 0.92
    fxratedate: "2026-01-15"
  - currency1: USD
    currency2: GBP
    fxrate: 0.79
    fxratedate: "2026-01-15"

# ── Localisation ──────────────────────────────────────────────────────────────
