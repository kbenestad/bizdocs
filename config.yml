# =============================================================================
# Root config — org-wide settings and navigation
# =============================================================================
# organization/logo/logo-maxwidth/tagline/accent-colour also cascade down to
# every app's own config.yml (invoice, reimburse, timesheet, contactmanager,
# and any app built from _template) — set them here ONCE and every app picks
# them up automatically. An app overrides a key only if it sets a non-blank
# value in its own config.yml.

# Organisation (shown in the page header)
organization:              # leave blank to show kBenestad wordmark
logo: no                   # yes|no — place logo.png or logo.jpg in assets/
logo-maxwidth: 4           # cm — maximum logo width on generated PDFs
tagline:                   # subtitle shown below org name

# Branding
accent-colour: "#2f6fed"

# Apps — paths relative to this folder
# Each app/link entry may set `hide-from-navselector: yes` (or `true`) to leave it
# out of the nav dropdown shown in every app's toolbar, while still listing it here
# on the landing page. Omitted, `no`, or `false` means it's shown (the default).
apps:
  - name: Invoice
    href: invoice/
    description: Freelance and consulting invoices as PDF
  - name: Reimburse
    href: reimburse/
    description: Expense reimbursement with attached receipts
  - name: Timesheet
    href: timesheet/
    description: Timesheets by employee type with signatures
  - name: Contactmanager
    href: contactmanager/
    description: Maintain a contact directory and publish a staff contact book

# External links (open in a new tab)
links:
  - name: GitHub
    href: https://github.com/kbenestad/bizdocs
    description: Source code and issue tracker
