# =============================================================================
# Template App — Configuration
# =============================================================================
# Copy this folder to start a new app, then rename and replace the marked
# "app-specific" parts. The keys below are the standard bizdocs config header;
# keep them and add your own (currencies, accounts, products, codes, …).

# ── Dependencies ───────────────────────────────────────────────────────────
# CDN libraries loaded dynamically after this file parses — swap `url` to
# point at a local vendored copy instead of the CDN without touching
# index.html; drop/blank `integrity` when doing so (a local file won't match
# the CDN's SRI hash). See ../dependencies.md for the current versions/hashes.
# Note: js-yaml itself stays hardcoded in index.html's <head> — it's needed
# to fetch and parse this very file, so it can't be config-driven.
dependencies:
  pdf-lib:
    url: "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"
    integrity: "sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI"

# Organization
organization:                # leave blank to show the kBenestad wordmark
logo: no                     # yes|no — if yes, loads ../assets/logo.png (shared org logo)
logo-maxwidth: 4             # cm — maximum logo width on the PDF
tagline:                     # subtitle shown below the org name (falls back to ui.subtitle)

# Page setup
page-size: A4                # A4 or letter

# PDF output language: "default" (first defined language) or "user-selected" (follow the UI)
output-language: default

# Typography (PDF). Standard fonts: Helvetica, Times, Courier (+ Bold/Italic).
font-body: Helvetica
font-heading: Helvetica
font-monospace: Courier
font-size: 10

# Branding — overrides the --accent token for this app
accent-colour: "#2f6fed"

# ── Localisation ──────────────────────────────────────────────────────────────
# Every user-facing string lives here, under each language's `ui:` block, and is
# looked up via S('key'). Use {token} placeholders for interpolation.
localisation:
  default-language: en

  languages:
    - code: en
      name: English
    - code: de
      name: Deutsch

  en:
    about:
      title: "About"
      button: "Close"
      content: |
        ### Template App
        A starter shell for a new **bizdocs** app — it already wires up the shared
        toolbar, theme, text-size control, language switch, About modal and footer.

        Replace the example card with your own form and PDF output.

        **Source:** [kbenestad/bizdocs](https://github.com/kbenestad/bizdocs)

        {repo}
        {version-line}

        Licensed under the Apache 2 licence. Please see LICENSE in root.
    ui:
      subtitle: "Starter template"
      example-section: "Example section"
      field-name: "Name"
      ph-name: "Full name"
      field-date: "Date"
      save: "Save"
      download: "Download PDF"

  de:
    about:
      title: "Über"
      button: "Schließen"
      content: |
        ### Vorlagen-App
        Ein Grundgerüst für eine neue **bizdocs**-App — Symbolleiste, Theme,
        Textgröße, Sprachwahl, Über-Dialog und Fußzeile sind bereits eingebunden.

        Ersetzen Sie die Beispielkarte durch Ihr eigenes Formular und PDF.

        **Quellcode:** [kbenestad/bizdocs](https://github.com/kbenestad/bizdocs)

        {repo}
        {version-line}

        Lizenziert unter der Apache-2-Lizenz. Siehe LICENSE im Root-Verzeichnis.
    ui:
      subtitle: "Startvorlage"
      example-section: "Beispielabschnitt"
      field-name: "Name"
      ph-name: "Vollständiger Name"
      field-date: "Datum"
      save: "Speichern"
      download: "PDF herunterladen"
