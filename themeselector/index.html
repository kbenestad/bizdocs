<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- connect-src additionally allows:
     - api.github.com + raw.githubusercontent.com: this app fetches mdcms's
       themes/ folder listing and theme YAML files live rather than shipping
       a copy — see docs/dependencies.md.
     - fonts.bunny.net + fonts.googleapis.com: a theme's font-body/
       font-heading is fetched as CSS *text* (not linked as a stylesheet —
       style-src stays 'self'/'unsafe-inline' only) and injected into the
       preview iframe as an inline <style>. font-src additionally allows
       fonts.gstatic.com for the woff2 files that Google-provided CSS points
       at (Bunny-provided CSS points at fonts.bunny.net, already allowed). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.bunny.net https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.github.com https://raw.githubusercontent.com https://fonts.bunny.net https://fonts.googleapis.com; object-src 'none'; base-uri 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no">
<title>Theme Selector</title>

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="assets/favicon.ico" sizes="32x32">
<link rel="icon" href="assets/favicon-48.png" sizes="48x48" type="image/png">
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="assets/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#2f6fed">

<!-- Restore persisted theme BEFORE first paint (avoids a flash). Keep this. -->
<script>
  (function(){var t=localStorage.getItem('kb-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"
        integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du"
        crossorigin="anonymous"></script>

<!-- Shared design + runtime. app.js MUST load before this app's inline <script>. -->
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="../assets/ui.css">
<script src="../assets/app.js"></script>

<style>
.ts-frame-wrap {
  border-radius: var(--radius);
  overflow: hidden; background: var(--surface);
}
.ts-frame-wrap iframe { display: block; width: 100%; border: 0; min-height: 500px; }
.ts-errors:empty { display: none; }
</style>
</head>
<body>
<div id="app"><p class="kb-loading">Loading configuration…</p></div>

<script>
(async function () {
'use strict';
/* IIFE-wrapped — top-level functions here are NOT globals, so they can't
 * collide with app.js. Helpers from app.js ($, el, kbHexRgb, makeSizeControl,
 * kbAbout, lookupString, …) are visible in here. */

let CFG;
let NAV = { apps: [], links: [] };
let lang = 'en';
let VERSION_INFO = null;

const MDCMS_REPO = 'kbenestad/mdcms';
const APP_OPTIONS = [
  ['invoice', '../invoice/'],
  ['reimburse', '../reimburse/'],
  ['timesheet', '../timesheet/'],
  ['contactmanager', '../contactmanager/'],
  ['dashboard', '../dashboard/'],
];
const STATE_KEY = 'themeselector-state';
let state = { app: 'invoice', category: '', theme: '' };
let currentThemeObj = null;       // parsed YAML of the selected theme, or null
let categoriesCache = null;       // [{name, path}], fetched once
const filesCache = new Map();     // category path -> [{name, path, download_url}]
let frameResizeObserver = null;
let frameThemeObserver = null;

function S(key, vars) {
  return lookupString(CFG['ui-strings'], key, lang, CFG['default-code'], vars);
}

function normaliseConfig() {
  const loc = CFG && CFG.localisation;
  if (!loc) return;
  const { table, languages, defaultCode } = buildLangTable(loc);
  CFG['default-code'] = defaultCode;
  CFG.languages = CFG.languages || languages;
  CFG['ui-strings'] = table;
}

function applyLang(lc) {
  lang = lc;
  const loc = CFG.localisation || {};
  const a = (loc[lc] && loc[lc].about) || (loc[CFG['default-code']] && loc[CFG['default-code']].about) || {};
  CFG['about-title']   = a.title   || 'About';
  CFG['about-content'] = a.content || '';
  CFG['about-button']  = a.button  || 'Close';
}

function showAboutModal() {
  return kbAbout({
    title: CFG['about-title'],
    contentMD: applyVersionTokens(CFG['about-content'], VERSION_INFO),
    closeLabel: CFG['about-button'],
  });
}

function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
}
function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STATE_KEY));
    if (raw && typeof raw === 'object') state = Object.assign(state, raw);
  } catch (e) {}
}

/* ── colour helpers ───────────────────────────────────────────────────────
 * kbHexRgb (app.js) only parses hex — mdcms themes routinely give ink/
 * on-surface-* as rgba() (semi-transparent whites/blacks are the whole
 * point of an on-surface tint), and at least one theme (OS Adwaita) gives
 * even the core `ink` token as rgba(). Every function below that used to
 * call kbHexRgb directly on a theme-supplied value would silently fail
 * (returning null) on any of those, and mixHex's null-input fallback
 * returns the OTHER colour completely unmixed — e.g. mixHex(surface, 88,
 * ink) with an unparseable ink returns surface verbatim, making
 * --border-strong exactly equal --surface, i.e. an invisible border on any
 * element whose background is also --surface (every input field). */
function parseColorRgb(v) {
  if (!v) return null;
  const hex = kbHexRgb(v);
  if (hex) return hex;
  const m = /^rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*[\d.]+\s*)?\)$/i.exec(String(v).trim());
  return m ? [Math.round(+m[1]), Math.round(+m[2]), Math.round(+m[3])] : null;
}
function relLuminance(hex) {
  const rgb = parseColorRgb(hex);
  if (!rgb) return 1;
  const [r, g, b] = rgb.map(c => {
    const s = c / 255;
    return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function onColorFor(hex) { return relLuminance(hex) > 0.45 ? '#14181E' : '#FFFFFF'; }
function colorsClash(a, b) {
  const ra = parseColorRgb(a), rb = parseColorRgb(b);
  if (!ra || !rb) return false;
  return Math.abs(ra[0] - rb[0]) + Math.abs(ra[1] - rb[1]) + Math.abs(ra[2] - rb[2]) < 20;
}
// Some mdcms themes set on-surface-* to var(--font-colour)/var(--nav-link-
// colour) etc. instead of a literal colour — mdcms's own shorthand for
// "whatever that other palette field resolves to" (its renderer defines
// these itself; see app/index.html's applyThemeYml()). We don't define them
// anywhere, so passing the string straight through made it fail at
// computed-value time — inheriting the wordmark's parent <svg fill="none">,
// i.e. invisible. But the reference IS meaningful: resolve it back through
// the same palette object mdcms itself would've pulled it from (chasing
// further var()s too — on-surface-title: var(--nav-link-colour) with
// on-surface: var(--font-colour) is a real two-level chain in the wild),
// rather than discarding the theme author's intent for a generic guess.
const MDCMS_VAR_TO_PALETTE_FIELD = {
  '--accent': 'primary',
  '--bg-main': 'page',
  '--bg-nav': 'surface',
  '--font-colour': 'ink',
  '--font-colour-muted': 'ink-muted',
  '--heading-colour': 'heading',
  '--nav-link-colour': 'on-surface',
  '--nav-link-active-colour': 'on-surface-active',
  '--nav-section-heading-colour': 'on-surface-heading',
  '--nav-sitename-colour': 'on-surface-title',
  '--nav-description-colour': 'on-surface-note',
  '--nav-toggle-colour': 'on-surface-icon',
  '--divider': 'divider',
};
function resolveMdcmsVar(value, m, depth) {
  if (depth === undefined) depth = 0;
  if (!value || depth > 5) return null;
  const match = /^var\(\s*(--[\w-]+)\s*\)$/i.exec(String(value).trim());
  if (!match) return value;
  const field = MDCMS_VAR_TO_PALETTE_FIELD[match[1]];
  if (!field || !m[field]) return null;
  return resolveMdcmsVar(m[field], m, depth + 1);
}

// Falls back to an auto-contrast colour (not the raw fallback) whenever a
// theme's key colour matches its surface colour with no resolvable
// on-surface-* override — many mdcms themes deliberately set primary ==
// surface ("a single bold colour drives both the nav and the accent"),
// which is safe in mdcms itself but can make an accent-coloured mark drawn
// on --bg disappear here.
function headerToken(themeVal, keyColor, surfaceColor, fallbackHex, m) {
  const resolved = resolveMdcmsVar(themeVal, m);
  if (resolved) return resolved;
  if (keyColor && surfaceColor && colorsClash(keyColor, surfaceColor)) return onColorFor(surfaceColor);
  return fallbackHex;
}

// Computed in JS, not via CSS color-mix() — color-mix() only shipped in
// browsers around 2023, and some mobile/WebView browsers that otherwise
// support fetch()/async fine still don't have it. Matches color-mix(in srgb,
// hexA pct%, hexB) exactly: color-mix's default "in srgb" interpolates raw
// (gamma-encoded) channel values, which is exactly a per-channel weighted
// average — no colour-space conversion needed.
function mixHex(hexA, pct, hexB) {
  const a = parseColorRgb(hexA), b = parseColorRgb(hexB);
  if (!a) return hexB || hexA;
  if (!b) return hexA;
  const t = pct / 100;
  const ch = i => Math.round(a[i] * t + b[i] * (1 - t)).toString(16).padStart(2, '0');
  return `#${ch(0)}${ch(1)}${ch(2)}`;
}

/* ── mdcms palette -> bizdocs CSS vars ──────────────────────────────────────
 * mdcms `page` (content bg, usually white)   -> bizdocs --surface (cards/inputs)
 * mdcms `surface` (nav bg, sometimes bold)    -> bizdocs --bg (page backdrop)
 * bizdocs has no separate nav-surface concept, so a bold mdcms nav colour
 * becomes the whole app's backdrop behind white cards.
 * ────────────────────────────────────────────────────────────────────────── */
function paletteModeVars(mode, m, sem) {
  if (!m || !m.primary) return '';
  const rgb = (parseColorRgb(m.primary) || [0, 0, 0]).join(',');
  const ink = m.ink, inkMuted = m['ink-muted'];
  const surface = m.page, bg = m.surface;
  const hoverBase = mode === 'dark' ? '#FFFFFF' : '#000000';
  const lines = [
    `--accent:${m.primary}`,
    `--accent-rgb:${rgb}`,
    `--on-accent:${onColorFor(m.primary)}`,
    `--accent-hover:${mixHex(m.primary, 85, hoverBase)}`,
    `--accent-soft:${mixHex(m.primary, 12, surface)}`,
    `--accent-border:${mixHex(m.primary, 35, surface)}`,
    `--bg:${bg}`,
    `--surface:${surface}`,
    // Mixed toward ink, NOT bg: these tint disabled/readonly form fields and
    // sit inside a white/page-toned card. Deriving them from bg instead
    // would drag in the nav colour's boldness even where it has nothing to
    // do with how a text field should read.
    `--surface-2:${mixHex(surface, 97, ink)}`,
    `--surface-3:${mixHex(surface, 92, ink)}`,
    `--border:${mixHex(surface, 88, ink)}`,
    `--border-strong:${mixHex(surface, 75, ink)}`,
    `--text:${ink}`,
    `--text-soft:${mixHex(ink, 55, inkMuted)}`,
    `--text-muted:${inkMuted}`,
    `--placeholder:${mixHex(inkMuted, 60, surface)}`,
    // Header/toolbar chrome sits directly on --bg, not on a card — needs its
    // own contrast pair (mdcms's on-surface-* group is exactly this).
    `--header-text:${headerToken(m['on-surface-title'], ink, bg, ink, m)}`,
    `--header-muted:${headerToken(m['on-surface-note'], inkMuted, bg, inkMuted, m)}`,
    `--header-link:${headerToken(m['on-surface'], ink, bg, ink, m)}`,
    `--header-accent:${headerToken(m['on-surface-active'], m.primary, bg, m.primary, m)}`,
    `--header-icon:${headerToken(m['on-surface-icon'], inkMuted, bg, inkMuted, m)}`,
  ];
  if (sem) {
    [['danger', 'error'], ['warning', 'warning'], ['success', 'success'], ['info', 'info']].forEach(([tok, key]) => {
      if (!sem[key]) return;
      lines.push(`--${tok}:${sem[key]}`);
      lines.push(`--${tok}-soft:${mixHex(sem[key], 12, surface)}`);
      lines.push(`--${tok}-border:${mixHex(sem[key], 35, surface)}`);
    });
  }
  return lines.join('; ');
}

// "provider:Font Name:weight" (provider: bunny | google), "Font Name:weight"
// (bunny implied), or "system-ui:weight" (no font to load — it's already on
// the system).
function parseFontSpec(spec) {
  if (!spec) return null;
  const parts = String(spec).split(':');
  let provider = 'bunny', name, weight;
  if (parts.length >= 3) { provider = parts[0].trim(); name = parts[1].trim(); weight = parts[2].trim(); }
  else if (parts.length === 2) { name = parts[0].trim(); weight = parts[1].trim(); }
  else return null;
  if (name === 'system-ui') return { provider: 'system', name, weight };
  return { provider, name, weight };
}

function fontCssUrl(spec) {
  const familyPlus = spec.name.replace(/ /g, '+');
  return spec.provider === 'google'
    ? `https://fonts.googleapis.com/css2?family=${familyPlus}:wght@${spec.weight}&display=swap`
    : `https://fonts.bunny.net/css?family=${familyPlus}:${spec.weight}`;
}

// Fetched as CSS *text* via fetch() (connect-src), not linked as a
// stylesheet (which style-src's 'self'/'unsafe-inline' wouldn't allow for an
// external host) — the response is @font-face rules whose own font-file
// url()s are governed by font-src instead, already allowing both hosts.
// Cached by URL so body+heading sharing a family only fetches once, and
// switching between two already-seen themes doesn't refetch either.
const fontCssCache = new Map();
function loadFontCss(url) {
  if (!fontCssCache.has(url)) {
    fontCssCache.set(url, fetch(url).then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    }));
  }
  return fontCssCache.get(url);
}

// Async and fire-and-forget from applyThemeToFrame(): the coloured theme
// applies immediately; fonts swap in a moment later once fetched (standard
// webfont FOUC), same as any font-loading approach. Failure (offline, an
// unrecognised family, ...) degrades to the plain name in buildThemeCss's
// font-family list, which itself falls back to var(--font-sans).
async function applyThemeFonts(doc, theme) {
  const styleId = 'mdcms-theme-fonts';
  let styleEl = doc.getElementById(styleId);
  const specs = [parseFontSpec(theme && theme['font-body']), parseFontSpec(theme && theme['font-heading'])]
    .filter(s => s && s.provider !== 'system');
  if (!specs.length) { if (styleEl) styleEl.textContent = ''; return; }
  if (!styleEl) { styleEl = doc.createElement('style'); styleEl.id = styleId; doc.head.appendChild(styleEl); }
  try {
    const urls = [...new Set(specs.map(fontCssUrl))];
    const cssTexts = await Promise.all(urls.map(loadFontCss));
    // doc may belong to a since-replaced iframe document by the time this
    // resolves (theme/app switched again mid-fetch) — re-check before writing.
    if (doc.getElementById(styleId) === styleEl) styleEl.textContent = cssTexts.join('\n');
  } catch (e) {
    styleEl.textContent = '';
  }
}

function buildThemeCss(theme) {
  if (!theme || !theme.palette) return '';
  const light = theme.palette.light, dark = theme.palette.dark;
  const semLight = theme['colours-semantic'] || null;
  const semDark = theme['colours-semantic-dark'] || semLight;
  let css = '';
  // Mirrors style.css's own cascade, where light is the UNCONDITIONED base
  // (plain :root {}) and dark applies via prefers-color-scheme OR an
  // explicit data-theme="dark". A plain :root[data-theme="light"] rule never
  // matches until the user has manually toggled the theme button at least
  // once (that's the only thing that ever sets the attribute) — on a first
  // visit, in either light or dark OS mode, that attribute is simply absent,
  // so an override scoped only to [data-theme="light"]/[data-theme="dark"]
  // silently never applies.
  if (light) css += `:root { ${paletteModeVars('light', light, semLight)}; }\n`;
  if (dark) {
    const darkVars = paletteModeVars('dark', dark, semDark);
    css += `@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) { ${darkVars}; } }\n`;
    css += `:root[data-theme="dark"] { ${darkVars}; }\n`;
  }
  const bodySpec = parseFontSpec(theme['font-body']);
  const headingSpec = parseFontSpec(theme['font-heading']) || bodySpec;
  const bodyFont = bodySpec && bodySpec.name;
  const headingFont = headingSpec && headingSpec.name;
  if (bodyFont) css += `body { font-family: "${bodyFont}", var(--font-sans); }\n`;
  if (headingFont) css += `.kb-doctitle h1, .kb-card__title, .kb-brand .org, .kb-modal__hdr { font-family: "${headingFont}", var(--font-sans); }\n`;
  css += `.kb-brand .org { color: var(--header-text); }
.kb-brand .org small { color: var(--header-muted); }
.kb-doctitle h1 { color: var(--header-text); }
.kb-doctitle .meta { color: var(--header-muted); }
.kb-brand .logo svg { --accent: var(--header-accent); }
/* The language select, size-control buttons, and theme/about icon buttons
   all have their OWN white/page-toned box (ui.css gives .kb-select and
   .kb-iconbtn/.kb-seg a var(--surface) background), so their default
   var(--text-muted)/var(--text) styling is already correct — it was a
   mistake to previously route .kb-toolbar .kb-select through
   var(--header-muted)/var(--header-text) here, which is for bare text with
   nothing behind it but --bg. --sz-label and the footer, however, ARE bare
   text sitting directly on --bg with no box of their own, and never got the
   header-safe treatment at all — on a bold/dark theme, plain ink-derived
   var(--text-muted) can be nearly as dark as --bg itself. */
.kb-sz-label, .kb-footer, .kb-footer a, .kb-footer button, .kb-mark { color: var(--header-muted); }
.kb-footer .kb-mark svg { --accent: var(--header-accent); }
/* Action rows (Download/Generate/Save buttons) sit directly on --bg, same
   as the header — most bizdocs apps put their primary CTA in a bare row
   below the last card, not inside one. On themes where primary == surface
   ("a single bold colour drives both the nav and the accent"), the button's
   --accent fill then exactly matches the --bg it sits on, and with the
   base .kb-btn's border:1px solid transparent, there's nothing to outline
   its shape — it disappears into the page. --on-accent is guaranteed to
   contrast with --accent (it's what the button's own label uses), so a
   border in that colour stays visible against the fill regardless of what
   it sits on, and is a no-op visually wherever accent and bg already differ. */
.kb-btn--primary { border-color: var(--on-accent); }
`;
  return css;
}

// Every app's boot calls app.js's applyAccent(), which sets --accent via
// INLINE style on <html> (document.documentElement.style.setProperty). An
// inline style always wins over any stylesheet rule regardless of source
// order or selector specificity, so a plain <style> override — however it's
// scoped — can never change --accent itself, even though every *derived*
// token (accent-hover/soft/border, computed as literal hex below) works
// fine. Fix: write --accent the same way the app itself does, so ours is
// simply the more-recent write to the same inline declaration. Captured
// once per iframe document so reverting to "bizdocs default" restores the
// app's own configured accent-colour instead of erasing it.
let frameOriginalAccent = null;

function frameCurrentMode(doc) {
  const attr = doc.documentElement.getAttribute('data-theme');
  if (attr === 'dark' || attr === 'light') return attr;
  try { return doc.defaultView.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
  catch (e) { return 'light'; }
}

function syncFrameAccent(doc) {
  if (frameOriginalAccent === null) frameOriginalAccent = doc.documentElement.style.getPropertyValue('--accent') || '';
  const palette = currentThemeObj && currentThemeObj.palette;
  const m = palette && palette[frameCurrentMode(doc)];
  if (m && m.primary) { doc.documentElement.style.setProperty('--accent', m.primary); return; }
  if (frameOriginalAccent) doc.documentElement.style.setProperty('--accent', frameOriginalAccent);
  else doc.documentElement.style.removeProperty('--accent');
}

// contentDocument can transiently be unready right after a src change/reload
// (more common on slower mobile connections) — retry briefly instead of
// silently no-op'ing, and surface a note if it never becomes available so a
// real failure is visible instead of looking like nothing happened.
function applyThemeToFrame(retriesLeft) {
  if (retriesLeft === undefined) retriesLeft = 10;
  const frame = $('#tsFrame');
  if (!frame) return;
  let doc;
  try { doc = frame.contentDocument; } catch (e) { doc = null; }
  if (!doc || !doc.head) {
    if (retriesLeft > 0) { setTimeout(() => applyThemeToFrame(retriesLeft - 1), 150); return; }
    showError('err-frame-access');
    return;
  }
  let styleEl = doc.getElementById('mdcms-theme-override');
  if (!styleEl) { styleEl = doc.createElement('style'); styleEl.id = 'mdcms-theme-override'; doc.head.appendChild(styleEl); }
  styleEl.textContent = buildThemeCss(currentThemeObj);
  syncFrameAccent(doc);
  applyThemeFonts(doc, currentThemeObj);
  clearError();
}

function setupFrameResize() {
  const frame = $('#tsFrame');
  if (!frame) return;
  let docEl;
  try { docEl = frame.contentDocument && frame.contentDocument.documentElement; } catch (e) { return; }
  if (!docEl || typeof ResizeObserver === 'undefined') return;
  if (frameResizeObserver) frameResizeObserver.disconnect();
  const resize = () => { frame.style.height = docEl.scrollHeight + 'px'; };
  frameResizeObserver = new ResizeObserver(resize);
  frameResizeObserver.observe(docEl);
  resize();
}

// Keeps --accent in sync when the user toggles light/dark INSIDE the
// preview (the iframe's own theme button) — that only flips data-theme, it
// doesn't re-run our accent sync, so without this the accent would keep
// showing whichever mode was active when a theme was first picked.
function setupFrameThemeWatch() {
  const frame = $('#tsFrame');
  if (!frame) return;
  let docEl;
  try { docEl = frame.contentDocument && frame.contentDocument.documentElement; } catch (e) { return; }
  if (!docEl) return;
  if (frameThemeObserver) frameThemeObserver.disconnect();
  frameThemeObserver = new MutationObserver(() => syncFrameAccent(docEl.ownerDocument));
  frameThemeObserver.observe(docEl, { attributes: true, attributeFilter: ['data-theme'] });
}

/* ── mdcms GitHub data source ────────────────────────────────────────────── */
async function ghListDir(path) {
  const res = await fetch(`https://api.github.com/repos/${MDCMS_REPO}/contents/${path.split('/').map(encodeURIComponent).join('/')}`,
    { headers: { Accept: 'application/vnd.github+json' } });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  return res.json();
}

async function loadCategories() {
  if (categoriesCache) return categoriesCache;
  const entries = await ghListDir('themes');
  categoriesCache = entries.filter(e => e.type === 'dir').sort((a, b) => a.name.localeCompare(b.name));
  return categoriesCache;
}

async function loadThemeFiles(categoryPath) {
  if (filesCache.has(categoryPath)) return filesCache.get(categoryPath);
  const entries = await ghListDir(categoryPath);
  const files = entries.filter(e => e.type === 'file' && /\.ya?ml$/i.test(e.name))
    .sort((a, b) => a.name.localeCompare(b.name));
  filesCache.set(categoryPath, files);
  return files;
}

function appPath(key) {
  const entry = APP_OPTIONS.find(([k]) => k === key);
  return entry ? entry[1] : APP_OPTIONS[0][1];
}

function prettyThemeName(filename) {
  return filename.replace(/\.ya?ml$/i, '').split(/[-_]/)
    .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

/* ── UI wiring ──────────────────────────────────────────────────────────── */
function showError(key, message) {
  const box = $('#tsErrors');
  if (!box) return;
  box.innerHTML = '';
  box.appendChild(el('div', { className: 'kb-note kb-note--error' },
    el('div', null, S(key, { message }))));
}
function clearError() {
  const box = $('#tsErrors');
  if (box) box.innerHTML = '';
}

async function populateCategorySelect(select) {
  select.innerHTML = '';
  select.appendChild(el('option', { value: '' }, S('opt-select-category')));
  select.appendChild(el('option', { value: '__loading', disabled: true }, S('opt-loading')));
  select.value = '__loading';
  try {
    const cats = await loadCategories();
    select.innerHTML = '';
    select.appendChild(el('option', { value: '' }, S('opt-select-category')));
    cats.forEach(c => select.appendChild(el('option', { value: c.path }, c.name)));
    select.value = state.category && cats.some(c => c.path === state.category) ? state.category : '';
    clearError();
  } catch (e) {
    select.innerHTML = '';
    select.appendChild(el('option', { value: '' }, S('opt-select-category')));
    showError('err-categories', e.message);
  }
}

async function populateThemeSelect(select, categoryPath) {
  select.innerHTML = '';
  if (!categoryPath) {
    select.disabled = true;
    select.appendChild(el('option', { value: '' }, S('opt-select-theme')));
    return;
  }
  select.disabled = false;
  select.appendChild(el('option', { value: '' }, S('opt-select-theme')));
  select.appendChild(el('option', { value: '__loading', disabled: true }, S('opt-loading')));
  select.value = '__loading';
  try {
    const files = await loadThemeFiles(categoryPath);
    select.innerHTML = '';
    select.appendChild(el('option', { value: '' }, S('opt-select-theme')));
    files.forEach(f => select.appendChild(el('option', { value: f.path }, prettyThemeName(f.name))));
    select.value = state.theme && files.some(f => f.path === state.theme) ? state.theme : '';
    clearError();
  } catch (e) {
    select.innerHTML = '';
    select.appendChild(el('option', { value: '' }, S('opt-select-theme')));
    showError('err-themes', e.message);
  }
}

async function selectTheme(categoryPath, themePath) {
  if (!themePath) { currentThemeObj = null; applyThemeToFrame(); return; }
  try {
    const files = filesCache.get(categoryPath) || [];
    const file = files.find(f => f.path === themePath);
    if (!file) return;
    const res = await fetch(file.download_url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    currentThemeObj = jsyaml.load(text);
    applyThemeToFrame();
    clearError();
  } catch (e) {
    showError('err-theme-file', e.message);
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const wrap = el('div', { className: 'kb-wrap' });

  wrap.appendChild(buildToolbar());
  wrap.appendChild(buildHeader());
  wrap.appendChild(buildPreviewCard());
  wrap.appendChild(buildFrame());
  wrap.appendChild(buildFooter());

  app.appendChild(wrap);
  updateThemeIcon();
  wireControls();
}

function buildToolbar() {
  const toolbar = el('div', { className: 'kb-toolbar' });
  const { seg: sizeSeg, label: szLabel } = makeSizeControl();
  toolbar.append(
    makeNavMenu(NAV),
    el('div', { className: 'spacer' }),
    sizeSeg, szLabel,
    makeThemeButton(),
    makeAboutButton(showAboutModal)
  );
  const langSel = makeLangSelect(CFG.languages, lang, value => {
    applyLang(value);
    localStorage.setItem('themeselector-lang', value);
    render();
  });
  if (langSel) toolbar.appendChild(langSel);
  return toolbar;
}

function buildHeader() {
  const header = el('header', { className: 'kb-header' });
  const brand = el('div', { className: 'kb-brand' });
  const tile = el('span', { className: 'logo' });
  if (CFG.logo === 'yes' || CFG.logo === true) {
    const img = el('img', { src: '../assets/logo.png', alt: CFG.organization || '' });
    img.onerror = () => { img.src = '../assets/logo.jpg'; img.onerror = () => { tile.innerHTML = KB_BRAND_SVG; }; };
    tile.appendChild(img);
  } else { tile.innerHTML = KB_BRAND_SVG; }
  const org = el('span', { className: 'org' });
  org.appendChild(document.createTextNode(CFG.organization || 'kbenestad/themeselector'));
  const small = el('small'); small.textContent = CFG.tagline || S('subtitle');
  org.appendChild(small);
  brand.append(tile, org);

  const title = el('div', { className: 'kb-doctitle' });
  title.appendChild(el('h1', null, 'Theme Selector'));

  header.append(brand, title);
  return header;
}

function field(label, node) {
  const f = el('div', { className: 'kb-field' });
  f.append(el('span', { className: 'kb-label' }, label), node);
  return f;
}

function buildPreviewCard() {
  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('section-title')));

  const appSelect = el('select', { className: 'kb-select', id: 'tsApp' });
  APP_OPTIONS.forEach(([key]) => appSelect.appendChild(el('option', { value: key }, S('app-' + key))));
  appSelect.value = state.app;

  const categorySelect = el('select', { className: 'kb-select', id: 'tsCategory' });
  const themeSelect = el('select', { className: 'kb-select', id: 'tsTheme', disabled: true });

  const grid = el('div', { className: 'kb-grid cols-3' });
  grid.append(
    field(S('field-app'), appSelect),
    field(S('field-category'), categorySelect),
    field(S('field-theme'), themeSelect)
  );
  card.appendChild(grid);

  const note = el('div', { className: 'kb-note kb-note--info' });
  note.appendChild(el('div', null, S('note-live')));
  card.appendChild(note);

  card.appendChild(el('div', { className: 'ts-errors', id: 'tsErrors' }));

  populateCategorySelect(categorySelect);
  populateThemeSelect(themeSelect, state.category);

  return card;
}

function buildFrame() {
  const wrap = el('div', { className: 'ts-frame-wrap' });
  const frame = el('iframe', { id: 'tsFrame', src: appPath(state.app), title: 'bizdocs app preview' });
  frame.addEventListener('load', () => { frameOriginalAccent = null; applyThemeToFrame(); setupFrameResize(); setupFrameThemeWatch(); });
  wrap.appendChild(frame);
  return wrap;
}

function wireControls() {
  const appSelect = $('#tsApp'), categorySelect = $('#tsCategory'), themeSelect = $('#tsTheme');

  appSelect.addEventListener('change', () => {
    state.app = appSelect.value;
    saveState();
    $('#tsFrame').src = appPath(state.app);
  });

  categorySelect.addEventListener('change', () => {
    state.category = categorySelect.value;
    state.theme = '';
    saveState();
    populateThemeSelect(themeSelect, state.category);
    currentThemeObj = null;
    applyThemeToFrame();
  });

  themeSelect.addEventListener('change', () => {
    state.theme = themeSelect.value;
    saveState();
    selectTheme(state.category, state.theme);
  });
}

function buildFooter() {
  const sep = () => el('span', { className: 'sep' }, '·');
  const footer = el('footer', { className: 'kb-footer' });
  const mark = el('span', { className: 'kb-mark' }); mark.innerHTML = KB_FOOTER_MARK_SVG + 'kBenestad';
  footer.append(
    mark,
    sep(), el('span', null, '© 2026 Kristian Benestad'),
    sep(), el('a', { href: 'https://github.com/kbenestad/bizdocs', target: '_blank', rel: 'noopener' }, 'kbenestad/bizdocs'),
    sep(), el('button', { type: 'button', onClick: showAboutModal }, CFG['about-title'] || 'About')
  );
  const marker = buildVersionMarker(VERSION_INFO);
  if (marker) footer.appendChild(marker);
  return footer;
}

// ── Boot ───────────────────────────────────────────────────────────────────
try {
  CFG = await loadYamlConfig();
  VERSION_INFO = await loadVersionInfo('../version.json');
  await applySharedBranding(CFG);
  NAV = await loadNavItems('../config.yml');
  normaliseConfig();
  applyAccent(CFG);
  initFontScale();
  loadState();
  lang = localStorage.getItem('themeselector-lang') || CFG['default-code'] || 'en';
  applyLang(lang);
  render();
} catch (e) {
  document.getElementById('app').innerHTML =
    `<div class="kb-wrap"><div class="kb-note kb-note--error"><span>⚠</span>` +
    `<div><b>Failed to load config.yml</b><br>${kbEsc(e.message)}</div></div></div>`;
}
})();
</script>
</body>
</html>
