name: Sync pages branch

# Mirrors the deployed app files from main onto the pages branch, which
# GitHub Pages serves (Settings > Pages > Deploy from a branch > pages > /).
# Copies index.html, config.yml, and every top-level directory EXCEPT the
# ones below — so a new app (copied from _template/, per "Adding a new app"
# in CLAUDE.md) is included automatically with no workflow edit needed.
# Keeps CLAUDE.md, DESIGN.md, README.md, LICENSE, docs/, _template/, and
# .github/ out of the published site — see CLAUDE.md.

on:
  push:
    branches:
      - main
    paths-ignore:
      - '_template/**'
      - 'docs/**'
      - '.github/**'
      - 'CLAUDE.md'
      - 'DESIGN.md'
      - 'README.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync app files onto pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin pages
          git worktree add /tmp/pages origin/pages

          # Clear everything except .git, then copy over the current app set.
          find /tmp/pages -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp index.html config.yml /tmp/pages/

          EXCLUDE_DIRS=(_template docs .github)
          for entry in */; do
            name="${entry%/}"
            skip=false
            for ex in "${EXCLUDE_DIRS[@]}"; do
              [ "$name" = "$ex" ] && skip=true && break
            done
            [ "$skip" = true ] || cp -r "$name" /tmp/pages/
          done

          cd /tmp/pages
          git add -A
          if git diff --cached --quiet; then
            echo "pages branch already up to date"
            exit 0
          fi
          git commit -m "Sync app files from main (${GITHUB_SHA::7})"
          git push origin HEAD:pages
