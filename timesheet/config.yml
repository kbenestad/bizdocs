# =============================================================================
# Timesheet App — Configuration
# =============================================================================

# Organization
organization:                # leave blank to show kBenestad wordmark
logo: no                     # yes|no — if yes, loads ../assets/logo.png (shared org logo)
logo-maxwidth: 7.5           # cm — maximum logo width on PDF
tagline:                     # subtitle shown below org name

# Page setup
page-size: A4                # A4 or letter

# PDF output language: default (the first defined language) or user-selected (follow the UI)
output-language: default

# Typography
# Standard fonts: Helvetica, Times, Courier (plus Bold/Italic variants)
# Custom: place a .ttf file in assets/ and use the filename (e.g. "assets/MyFont.ttf")
font-body: Helvetica
font-heading: Helvetica
font-monospace: Courier
font-size: 10                # base font size in pt for PDF

# Branding
accent-colour: "#2f6fed"

# Form text (appears on PDF)
footer: "Confidential"

muted-background: yes
needssignature: yes
default-work-code: REG

employee-types:
  - code: hourly
    display: "Hourly"
    prefilled: non-working

  - code: monthly
    display: "Monthly"
    prefilled: working

  - code: freelance
    display: "Freelance"
    prefilled: non-working

workdays: [Mon, Tue, Wed, Thu, Fri]
workhours-from: "09:00"
workhours-to: "17:00"

holidays:
  - date: "2025-01-01"
  - date: "2025-04-30"
  - date: "2025-05-01"
  - date: "2025-09-02"

  - date: "2026-01-01"
  - date: "2026-04-30"
  - date: "2026-05-01"
  - date: "2026-09-02"

codes:
  - code: NON
    counthours: no
    lockstate: locked
    employee-types: [hourly, freelance]
    colour-border: "#393939"
    colour-bg: "#d7d7d7"

  - code: REG
    counthours: yes
    lockstate: unlocked
    employee-types: [monthly, hourly, freelance]
    colour-border: "#0078d7"
    colour-bg: "#cce4f7"

  - code: PPT
    counthours: yes
    lockstate: locked
    employee-types: [monthly, hourly]
    colour-border-fullday: "#ed616f"
    colour-bg-fullday: "#ffd9d9"
    colour-border-partialday: "#ffb900"
    colour-bg-partialday: "#fff1cc"

  - code: OTH
    counthours: yes
    lockstate: unlocked
    employee-types: [monthly, hourly]
    colour-border: "#a4252c"
    colour-bg: "#edd4d5"

  - code: UNP
    counthours: yes
    lockstate: locked
    employee-types: [monthly]
    colour-border: "#393939"
    colour-bg: "#d7d7d7"

  - code: HOL
    counthours: yes
    lockstate: locked
    employee-types: [monthly, hourly, freelance]
    colour-border: "#8cbd18"
    colour-bg: "#e8f2d1"

# ── Localisation ──────────────────────────────────────────────────────────────
localisation:
  default-language: en

  # ── Language declarations ──────────────────────────────────────────────────
  languages:
    - code: en
      name: "English"
    - code: de
      name: "Deutsch"
    - code: fr
      name: "Français"
    - code: es
      name: "Español"

